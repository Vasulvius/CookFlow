{% extends "base.html" %}

{% block title %}Meal_recipe Details{% endblock %}

{% block content %}
<div class="container mt-5">
    <h1>Meal_recipe Details</h1>
    
    <div class="card mt-4">
        <div class="card-body"><div class="mb-3">
                <strong>Meal:</strong>
                <span>{{ item.meal }}</span>
            </div><div class="mb-3">
                <strong>Recipe:</strong>
                <span>{{ item.recipe }}</span>
            </div><div class="mb-3">
                <strong>Servings:</strong>
                <span>{{ item.servings }}</span>
            </div></div>
    </div>

    <div class="mt-3">
        <a href="{{ url_for('meal_recipe.update', id=item.id) }}" class="btn btn-primary">Edit</a>
        <a href="{{ url_for('meal_recipe.read_all') }}" class="btn btn-secondary">Back</a>
        <form method="POST" action="{{ url_for('meal_recipe.delete', id=item.id) }}" class="d-inline">
            <button type="submit" class="btn btn-danger" onclick="return confirm('Are you sure?')">Delete</button>
        </form>
    </div>
</div>
{% endblock %}
